version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: linum-postgres
    environment:
      POSTGRES_DB: linum
      POSTGRES_USER: linum
      POSTGRES_PASSWORD: linum
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: